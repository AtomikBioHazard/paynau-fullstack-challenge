version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=./data/paynau.db
      - JWT_SECRET=change-this-in-production
      - JWT_EXPIRES_IN=15m
    volumes:
      - ./data:/app/data
    networks:
      - paynau-network
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - paynau-network
networks:
  paynau-network:
    driver: bridge
